name: Marketplace Request
description: Propose a service request, bounty, milestone, or project.
title: "[Request]: "
labels: ["bounty", "triage"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - task
        - milestone
        - project
        - retainer
    validations:
      required: true
  - type: input
    id: reward
    attributes:
      label: Budget
      placeholder: "500 USDC"
    validations:
      required: true
  - type: textarea
    id: support
    attributes:
      label: Support criteria
      description: Links, reviewers, review SLA, required context, and resources.
    validations:
      required: true
  - type: textarea
    id: milestones
    attributes:
      label: Milestone breakdown
      description: One milestone per line; include optional amount hints if the work should split across phases.
      placeholder: |
        Discovery
        Build
        Review
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Objective checks required before payout approval.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence expected
      description: PRs, tests, deployments, documents, or other proof.
    validations:
      required: true
