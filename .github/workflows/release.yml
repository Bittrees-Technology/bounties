name: Release build

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --run
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=moderate
      - uses: actions/upload-artifact@v4
        with:
          name: bittrees-bounties-${{ github.ref_name }}
          path: dist/
